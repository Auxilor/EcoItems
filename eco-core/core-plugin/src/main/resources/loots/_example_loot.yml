# Loot injection: drop custom items from vanilla blocks, mobs, or fishing.
# Remove the leading _ from the file name to enable this example.

# block (breaking vanilla blocks), mob (player kills), or fishing.
type: block

# What this loot drops from (not used by fishing).
# Block loot takes any eco block lookup - materials, #tags, ecoitems:my_block,
# or another plugin's custom blocks. Mob loot takes any eco entity lookup -
# entity types, #tags, or custom entities.
targets:
  - stone
  - deepslate

# The chance for this loot to roll at all, 0-1.
chance: 0.02

# Fortune on the tool multiplies drop amounts (block loot only).
fortune: true

# The dropped items; each rolls its own chance within a successful loot roll.
# For fishing, the first rolled item replaces the vanilla catch.
items:
  - item: ecoitems:ruby   # any eco item lookup (ecoitems:x, vanilla, ...)
    chance: 1.0
    amount: 1

# Bonus xp.
xp: 1-3

# Optional filters: biome and world names (empty = everywhere).
# biomes:
#   - deep_dark
# worlds:
#   - world

# Optional libreforge conditions checked on the player.
conditions: []
