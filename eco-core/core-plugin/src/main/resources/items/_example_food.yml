# The ID of the item is the name of the .yml file,
# for example hardened_netherite_sword.yml has the ID of hardened_netherite_sword
# You can place items anywhere in this folder,
# including in subfolders if you want to organize your item configs
# _example.yml is not loaded.

item:
  item: cooked_beef glint item_name:"Enchanted Steak" # The item in-game: https://hub.auxilor.io/wiki/eco/the-item-lookup-system-the-item-lookup-system
  display-name: "&6Enchanted Steak" # The display name of the item

  # Vanilla item components, with the same format as in vanilla commands:
  # https://minecraft.wiki/w/Data_component_format
  components:
    # Read here: https://minecraft.wiki/w/Data_component_format#food
    "minecraft:food":
      nutrition: 12
      saturation: 2
      can_always_eat: false

    # Read here: https://minecraft.wiki/w/Data_component_format#consumable
    "minecraft:consumable":
      consume_seconds: 1 # The time in seconds it takes to eat the food
      on_consume_effects:
        - type: "minecraft:apply_effects"
          effects:
            - id: "minecraft:regeneration"
              duration: 40 # The duration of the potion effect in ticks
              amplifier: 0 # The level of the potion effect, starting at 0
          probability: 1.0

  lore: # The item lore
    - "&7The most delicious steak in all the land."
    - "&7Restores &a12 &7hunger and &a2 &7saturation."
    - ""
    - "&6Special Effects:"
    - "&8» &7Grants &aRegeneration I &7for &a2 &7seconds."
  craftable: true # If the item can be crafted
  recipe-give-amount: 1 # (Optional) Set the amount of items to give, defaults to 1
  crafting-permission: ecoitems.craft.custom_food # (Optional) The permission required to craft the item
  shapeless: false # (Optional) Whether the crafting recipe is shapeless or not, defaults to false
  recipe: # The recipe, read here for more: https://hub.auxilor.io/wiki/eco/the-item-lookup-system-the-item-lookup-system#crafting-recipes
    - ""
    - cooked_beef 64
    - ""
    - cooked_beef 64
    - cooked_beef 64
    - cooked_beef 64
    - ""
    - cooked_beef 64
    - ""

# The slot the item has to be in to activate its effects.
# The options for slot are mainhand, offhand, hands, helmet, chestplate,
# leggings, boots, armor, any, a number from 0-40 (to specify an exact slot),
# or a list of slots like "9, 10, 11, mainhand"
# Use to choose weather this is a weapon, tool, armor piece, charm, etc.
# If you don't specify this, it will default to mainhand.
slot: mainhand

# (Optional) The rarity of the item
rarity: rare

# The effects of the item (i.e. the functionality)
# See here: https://hub.auxilor.io/wiki/libreforge/configuring-an-effect
effects:
  - id: give_xp
    args:
      amount: 10
    triggers:
      - consume

# The conditions required for the effects to activate
conditions: []
